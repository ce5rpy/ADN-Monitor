# Release Please — automated semver + Release PRs.
#
# Flow:
#   push to master (after merging feature PRs) → opens/updates Release PR against master
#   merge Release PR → tag vX.Y.Z-rc.N + GitHub Release (prerelease)
#
# Squash merge: Release Please reads commit messages on master. Use a PR title
# like fix: / feat: — that becomes the squash commit message.
#
# Commits (conventional): fix→patch, feat→minor, BREAKING CHANGE→major.
# RC phase: prerelease-type rc (2.0.0-rc.6 → 2.0.0-rc.7).

name: release-please

on:
  push:
    branches:
      - develop
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-develop:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync develop from master
        run: |
          git fetch origin master develop
          git checkout develop
          git reset --hard origin/master
          git push --force-with-lease origin develop
