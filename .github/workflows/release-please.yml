# Release Please
#
# Flow:
#   1. Merge fix:/feat: PR → develop (squash title = conventional commit)
#   2. This workflow opens/updates the Release PR on develop
#   3. auto-merge-release merges that Release PR (title must be "Release X.Y.Z-rc.N")
#   4. Second push → tag v* + GitHub Release (prerelease)
#   5. sync-master fast-forwards master to match develop
#
# Do NOT merge Release PRs manually with the wrong title (e.g. "chore: release master").
# Do NOT merge develop → master by hand for releases.

name: release-please

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: develop
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  auto-merge-release:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Merge open Release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base develop \
            --head release-please--branches--develop \
            --state open \
            --json number,title \
            --jq '.[0]')
          if [ "$PR" = "null" ] || [ -z "$PR" ]; then
            echo "No open Release PR on develop — nothing to merge."
            exit 0
          fi
          NUMBER=$(echo "$PR" | jq -r '.number')
          TITLE=$(echo "$PR" | jq -r '.title')
          HAS_LABEL=$(gh pr view "$NUMBER" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | index("autorelease: pending") != null')
          if [ "$HAS_LABEL" != "true" ]; then
            echo "PR #${NUMBER} missing autorelease: pending label — skipping."
            exit 0
          fi
          echo "Auto-merging Release PR #${NUMBER}: ${TITLE}"
          gh pr merge "$NUMBER" --repo "${{ github.repository }}" --merge

  sync-master:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward master to develop
        run: |
          git fetch origin master develop
          git checkout master
          git reset --hard origin/develop
          git push origin master
