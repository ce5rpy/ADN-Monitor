# Release workflow
#
#   RC (develop): python-semantic-release on push → rc.N + tag + GitHub Release → sync master
#   Stable (master): workflow_dispatch → promote rc.N to N.N.N + tag + GitHub Release → sync develop

name: release

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Reset to workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Stable release (master)
        if: github.ref_name == 'master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/stable-release.sh

      - name: Semantic Release (develop)
        if: github.ref_name != 'master'
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions[bot]
          git_committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          vcs_release: "false"

      - name: Create GitHub Release
        if: github.ref_name != 'master' && steps.semantic.outputs.released == 'true' && steps.semantic.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.semantic.outputs.tag }}
          VERSION: ${{ steps.semantic.outputs.version }}
          IS_PRERELEASE: ${{ steps.semantic.outputs.is_prerelease }}
          RELEASE_NOTES: ${{ steps.semantic.outputs.release_notes }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists for $TAG"
            gh release view "$TAG" --json url -q .url
            exit 0
          fi
          PRERELEASE_FLAG=()
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG=(--prerelease)
          fi
          NOTES_FILE="$(mktemp)"
          if [[ -n "$RELEASE_NOTES" ]]; then
            printf '%s\n' "$RELEASE_NOTES" > "$NOTES_FILE"
          else
            printf 'Release %s\n' "$VERSION" > "$NOTES_FILE"
          fi
          gh release create "$TAG" --title "$VERSION" "${PRERELEASE_FLAG[@]}" --notes-file "$NOTES_FILE"
          rm -f "$NOTES_FILE"

      - name: Verify GitHub Release
        if: github.ref_name != 'master' && steps.semantic.outputs.released == 'true' && steps.semantic.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.semantic.outputs.tag }}
        run: gh release view "$TAG"

      - name: Sync develop from master
        if: github.ref_name == 'master'
        run: |
          git fetch origin master
          git push origin origin/master:refs/heads/develop

      - name: Sync master from develop
        if: github.ref_name != 'master' && steps.semantic.outputs.released == 'true'
        run: |
          git fetch origin develop
          git push origin origin/develop:refs/heads/master
