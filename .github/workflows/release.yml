# Release with python-semantic-release (standard tool for pyproject.toml projects).
#
#   merge PR → develop  (squash title: fix: / feat:)
#        ↓
#   bump version + CHANGELOG + tag + GitHub Release
#        ↓
#   master fast-forwarded to develop
#
# Stable 2.0.0 later: merge develop → master and run this workflow on master
# (master branch config has prerelease = false).

name: release

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Reset to workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions[bot]
          git_committer_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Sync master to develop
        if: steps.semantic.outputs.released == 'true'
        run: |
          git fetch origin develop
          git push origin origin/develop:refs/heads/master
