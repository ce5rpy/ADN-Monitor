# ADN Monitor – Nginx (unified FastAPI: /api + /ws on MONITOR_APP.LISTEN_PORT)
# Prerequisite: npm run build in frontend/

upstream adn_monitor_api {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name chile.adn.systems 7301.adn.systems;

    root /opt/adn-monitor/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://adn_monitor_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://adn_monitor_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    error_page 404 /index.html;
}
