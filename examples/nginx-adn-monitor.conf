# ADN Monitor – Nginx config example
# Copy to /etc/nginx/sites-enabled/ and adjust paths, server_name, and SSL paths.
# Prerequisite: build frontend: cd /opt/adn-monitor/frontend && npm run build

upstream wsbackend-monitor {
    ip_hash;
    server 127.0.0.1:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name chile.adn.systems 7301.adn.systems;

    root /opt/adn-monitor/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/adn-monitor/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param ADN_CONFIG_PATH /opt/adn-monitor/monitor/adn-mon.yaml;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
    }

    location /ws {
        proxy_pass http://wsbackend-monitor;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    error_page 404 /index.html;
}

